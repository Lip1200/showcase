name: Deploy to Infomaniak

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Create deploy archive
        run: |
          tar -czf deploy.tar.gz \
            --exclude='.next/cache' \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.js

      - name: SFTP upload
        env:
          SSHPASS: ${{ secrets.DEPLOY_KEY_PASS }}
        run: |
          sudo apt-get install -y sshpass
          echo "put deploy.tar.gz ${{ secrets.DEPLOY_PATH }}/deploy.tar.gz" | \
            sshpass -e sftp -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}

      - name: Extract and install
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_KEY_PASS }}
          port: 22
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            # Preserve old static chunks so cached browsers don't get 404s
            if [ -d .next/static ]; then
              cp -r .next/static /tmp/next_static_backup
            fi
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            # Restore old static chunks alongside new ones
            if [ -d /tmp/next_static_backup ]; then
              cp -rn /tmp/next_static_backup/. .next/static/
              rm -rf /tmp/next_static_backup
            fi
            npm ci --omit=dev
