name: Deploy to Infomaniak (SFTP)
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build and Compress (Next.js standalone ➜ deploy.tar.gz)
        run: |
          npm ci
          npm run build
          cd deploy
          tar -czf ../deploy.tar.gz .
          cd ..

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_KEY_PASS }}
          port: 22
          script: |
            cd "${{ secrets.DEPLOY_PATH }}"
            mkdir -p backup
            # Vider le dossier en conservant seulement le backup
            find . -maxdepth 1 -mindepth 1 ! -name 'backup' -exec rm -rf {} + 2>/dev/null || true

      - name: SFTP upload (deploy.tar.gz)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server:     ${{ secrets.DEPLOY_HOST }}
          username:   ${{ secrets.DEPLOY_USER }}
          password:   ${{ secrets.DEPLOY_KEY_PASS }}
          port:       22
          sftp_only:  true
          local_path: './deploy.tar.gz'
          remote_path: "${{ secrets.DEPLOY_PATH }}"

      - name: Extract and Install
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_KEY_PASS }}
          port: 22
          script: |
            cd "${{ secrets.DEPLOY_PATH }}"
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            npm install --omit=dev
