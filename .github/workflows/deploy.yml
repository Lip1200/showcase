name: Deploy to Infomaniak

on:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Use Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Create deploy archive
        run: |
          tar -czf deploy.tar.gz \
            --exclude='.next/cache' \
            .next \
            public \
            package.json \
            package-lock.json \
            next.config.js

      - name: SFTP upload
        env:
          SSHPASS: ${{ secrets.DEPLOY_KEY_PASS }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          sudo apt-get install -y sshpass
          echo "put deploy.tar.gz $DEPLOY_PATH/deploy.tar.gz" | \
            sshpass -e sftp -o StrictHostKeyChecking=no \
            "$DEPLOY_USER@$DEPLOY_HOST"

      - name: Extract and install
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17 # v1.2.0
        env:
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_KEY_PASS }}
          port: 22
          envs: CONTACT_EMAIL,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,SMTP_SECURE,DEPLOY_PATH
          script: |
            set -e
            cd "$DEPLOY_PATH"
            # Preserve old static chunks so cached browsers don't get 404s
            if [ -d .next/static ]; then
              cp -r .next/static /tmp/next_static_backup
            fi
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            # Restore old static chunks alongside new ones
            if [ -d /tmp/next_static_backup ]; then
              cp -rn /tmp/next_static_backup/. .next/static/
              rm -rf /tmp/next_static_backup
            fi
            # Write runtime env vars to .env.local
            printf 'CONTACT_EMAIL=%s\nSMTP_HOST=%s\nSMTP_PORT=%s\nSMTP_USER=%s\nSMTP_PASS=%s\nSMTP_SECURE=%s\n' \
              "$CONTACT_EMAIL" "$SMTP_HOST" "$SMTP_PORT" "$SMTP_USER" "$SMTP_PASS" "$SMTP_SECURE" \
              > .env.local
            npm ci --omit=dev
