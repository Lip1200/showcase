name: Deploy to Infomaniak (SFTP)
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build and Compress (Next.js standalone ➜ deploy.tar.gz)
        run: |
          npm ci
          npm run build
          cd deploy
          tar -czf ../deploy.tar.gz .
          cd ..

      - name: Debug remote paths
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_KEY_PASS }}
          port: 22
          script: |
            echo "HOME=$HOME"
            find /srv -maxdepth 4 -type d 2>/dev/null | head -20
            find /home -maxdepth 4 -type d 2>/dev/null | head -20

      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_KEY_PASS }}
          port: 22
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            mkdir -p backup
            find . -maxdepth 1 -mindepth 1 ! -name 'backup' -exec rm -rf {} + 2>/dev/null || true

      - name: SFTP upload (deploy.tar.gz)
        env:
          SSHPASS: ${{ secrets.DEPLOY_KEY_PASS }}
        run: |
          sudo apt-get update -y || true
          sudo apt-get install -y sshpass
          echo "put deploy.tar.gz ${{ secrets.DEPLOY_PATH }}/deploy.tar.gz" | \
            sshpass -e sftp -o StrictHostKeyChecking=no \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}

      - name: Extract and Restart
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_KEY_PASS }}
          port: 22
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
