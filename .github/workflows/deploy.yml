name: Deploy to Infomaniak (SFTP)
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build (Next.js standalone ➜ deploy/)
        run: |
          npm ci
          npm run build
          echo "Contents of deploy/:"
          ls -la deploy || (echo "deploy/ missing" && exit 1)

      # Prépare le dossier cible côté serveur (cleanup ancien projet)
      - name: Prepare remote directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          password: ${{ secrets.DEPLOY_KEY_PASS }}
          port: 22
          script: |
            cd "${{ secrets.DEPLOY_PATH }}"
            mkdir -p "${{ secrets.DEPLOY_PATH }}/backup"
            # Nettoyer les anciens fichiers
            find . -maxdepth 1 -type f -delete 2>/dev/null || true
            rm -rf src/ views/ dist/ node_modules/ .next/ test/ 2>/dev/null || true

      # Upload des artefacts standalone
      - name: SFTP upload (deploy/)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.6
        with:
          server:     ${{ secrets.DEPLOY_HOST }}
          username:   ${{ secrets.DEPLOY_USER }}
          password:   ${{ secrets.DEPLOY_KEY_PASS }}
          port:       22
          sftp_only:  true
          local_path: "deploy"                           # le dossier local
          remote_path: "${{ secrets.DEPLOY_PATH }}"      # upload directement dans le dossier cible

      - name: Deploy completed
        run: |
          echo "✅ Deploy completed! Files uploaded to ${{ secrets.DEPLOY_PATH }}"
          echo "Run these commands on the server:"
          echo "cd ${{ secrets.DEPLOY_PATH }} && npm install --omit=dev && nohup node server.js > server.log 2>&1 &"
